<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPQI - Partner-Bericht</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #e0e0e0;
            color: #333;
            padding: 20px;
            line-height: 1.5;
        }

        /* --- Report Controls (Screen only) --- */
        #report-controls {
            max-width: 900px;
            margin: 0 auto 20px auto;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #report-controls button {
            padding: 10px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            background: #049fd9;
        }

        #report-controls button:hover { background: #037fb3; }

        #report-status {
            font-size: 14px;
            color: #666;
        }

        /* --- Loading --- */
        #loading-overlay {
            text-align: center;
            padding: 80px 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #ddd;
            border-top: 4px solid #049fd9;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- Partner Section (one per partner, one per page in print) --- */
        .partner-section {
            background: #fff;
            max-width: 900px;
            margin: 0 auto 40px auto;
            padding: 60px 40px 35px 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
            border-radius: 4px;
            page-break-after: always;
        }

        .partner-section:last-child { page-break-after: auto; }

        /* --- Partner Header (3 columns) --- */
        .report-header {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #049fd9;
        }

        .report-header-left {
            flex: 0 0 180px;
            display: flex;
            align-items: center;
        }

        .report-header-left img {
            width: 180px;
            height: 70px;
            object-fit: contain;
            object-position: left center;
        }

        .report-header-center {
            flex: 1;
        }

        .report-header-center h2 {
            font-size: 1.5em;
            color: #049fd9;
            margin-bottom: 6px;
        }

        .report-header-right {
            flex: 0 0 120px;
            text-align: right;
        }

        .report-header-right img {
            width: 120px;
            object-fit: contain;
        }

        .report-kpi-row {
            display: flex;
            gap: 20px;
            font-size: 0.9em;
            color: #555;
            margin-top: 6px;
        }

        .report-kpi {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .report-kpi strong {
            color: #333;
        }

        .nps-pie-report {
            display: inline-block;
            width: 24px;
            height: 24px;
            min-width: 24px;
            min-height: 24px;
            border-radius: 50%;
            vertical-align: middle;
            margin-left: 4px;
        }

        /* --- Score Bar --- */
        .report-score-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .report-score-bar {
            flex: 1;
            display: flex;
            height: 34px;
            border-radius: 4px;
            overflow: hidden;
        }

        .report-score-neg {
            background: #e74c3c;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
            font-size: 0.9em;
            border-radius: 4px 0 0 4px;
        }

        .report-score-pos {
            background: #2ecc71;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
            font-size: 0.9em;
            border-radius: 0 4px 4px 0;
        }

        .report-score-total {
            font-size: 1.2em;
            font-weight: bold;
            min-width: 70px;
            text-align: right;
        }

        /* --- Mini Ranking --- */
        .mini-ranking {
            flex: 0 0 280px;
        }

        .mini-ranking-label {
            font-size: 0.75em;
            color: #999;
            margin-bottom: 4px;
        }

        /* --- Content Sections --- */
        .report-section {
            margin-bottom: 20px;
        }

        .report-section-title {
            font-size: 1.05em;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            padding-bottom: 4px;
            border-bottom: 1px solid #eee;
        }

        /* --- Matrix + Detail (stacked, not side by side) --- */
        .report-matrix-col {
            margin-bottom: 15px;
            text-align: center;
        }

        .report-matrix-col svg {
            width: 380px;
            height: auto;
            max-width: 100%;
        }

        .report-detail-col {
            margin-bottom: 15px;
        }

        /* --- Tables --- */
        .report-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85em;
        }

        .report-table th {
            background: #f8f9fa;
            padding: 6px 8px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #dee2e6;
            white-space: nowrap;
        }

        .report-table td {
            padding: 5px 8px;
            border-bottom: 1px solid #eee;
        }

        .report-table td.num {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .report-table tr:last-child td { border-bottom: none; }

        /* --- Area Bar (reuse from main CSS) --- */
        .area-hbar {
            display: flex;
            height: 20px;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .area-hbar-segment {
            height: 100%;
        }

        .area-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 0.8em;
            color: #555;
        }

        .area-legend-item {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .area-legend-swatch {
            width: 10px;
            height: 10px;
            border-radius: 1px;
            display: inline-block;
        }

        /* --- Comments --- */
        .report-comment-list {
            list-style: none;
            padding: 0;
        }

        .report-comment-list li {
            padding: 6px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.9em;
        }

        .report-comment-list li:last-child { border-bottom: none; }

        .report-comment-criterion {
            font-weight: 600;
            color: #049fd9;
            margin-bottom: 2px;
            font-size: 0.85em;
        }

        /* --- Insights (Divergence, Action Items) --- */
        .report-insight-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.8em;
            font-weight: 600;
            margin-right: 5px;
        }

        .badge-warning { background: #fff3cd; color: #856404; }
        .badge-danger { background: #f8d7da; color: #721c24; }

        /* --- Error --- */
        .report-error {
            max-width: 900px;
            margin: 60px auto;
            text-align: center;
            padding: 40px;
            background: #fff;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        }

        .report-error h2 { color: #e74c3c; margin-bottom: 10px; }

        /* --- Print Styles --- */
        @media print {
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

            body {
                background: white;
                padding: 0;
                margin: 0;
            }

            #report-controls { display: none !important; }

            .partner-section {
                box-shadow: none;
                max-width: none;
                margin: 0;
                padding: 15mm 12mm;
                border-radius: 0;
                page-break-after: always;
                break-after: page;
            }

            .partner-section:last-child {
                page-break-after: auto;
                break-after: auto;
            }

            .report-table tr { page-break-inside: avoid; }
            .report-matrix-col { page-break-inside: avoid; }
            .report-page-break { page-break-before: always; break-before: page; }
        }
    </style>
</head>
<body>

    <div id="report-controls">
        <button onclick="window.print()">Drucken / PDF speichern</button>
        <span id="report-status"></span>
    </div>

    <div id="loading-overlay" style="display: none;">
        <div class="loading-spinner"></div>
        <p>Partner-Bericht wird erstellt...</p>
    </div>

    <div id="report-container"></div>

    <script type="module" src="js/partner_report.js"></script>

</body>
</html>
